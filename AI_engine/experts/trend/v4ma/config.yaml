# V4MA — Moving Average Expert Configuration
# Expert ID: V4MA
# Type: Per-symbol (runs for all 92 symbols)

expert_id: V4MA
expert_name: Moving Average Expert
group: TREND
version: "1.0.0"

# ---------------------------------------------------------------------------
# OUTPUT SCALE
# ---------------------------------------------------------------------------
scale_min: -4
scale_max: 4

# ---------------------------------------------------------------------------
# MA PARAMETERS
# ---------------------------------------------------------------------------
ma_periods:
  ema10: 10
  ema20: 20
  sma50: 50
  sma100: 100
  sma200: 200

slope_window: 5   # days to compute MA slope

# ---------------------------------------------------------------------------
# SCORING
# ---------------------------------------------------------------------------
scoring:
  # Price vs MAs alignment (range: -3 to +3)
  alignment:
    all_bullish: 3       # close > ema10 > ema20 > sma50 > sma100 > sma200
    strong_bullish: 2    # close > ema20 > sma50 > sma100
    mild_bullish: 1      # close > ema20 > sma50
    neutral: 0
    mild_bearish: -1     # close < ema20 < sma50
    strong_bearish: -2   # close < ema20 < sma50 < sma100
    all_bearish: -3      # close < ema10 < ema20 < sma50 < sma100 < sma200

  # Cross signals (additive: -1 to +1)
  cross:
    golden_cross: 1      # sma50 crosses above sma200
    death_cross: -1      # sma50 crosses below sma200
    short_cross_up: 0.5  # ema10 crosses above ema20
    short_cross_down: -0.5

  # Total clamped to [-4, +4]

# ---------------------------------------------------------------------------
# SIGNAL QUALITY
# ---------------------------------------------------------------------------
quality:
  # Based on number of MAs confirming same direction
  level_4: 5    # all 5 MAs confirm
  level_3: 4
  level_2: 3
  level_1: 2

# ---------------------------------------------------------------------------
# DATA REQUIREMENTS
# ---------------------------------------------------------------------------
min_history_days: 220   # need 200 + buffer for SMA200

# ---------------------------------------------------------------------------
# DATA LEAKAGE PREVENTION
# ---------------------------------------------------------------------------
# Ngay T chi dung data den close T-1.
